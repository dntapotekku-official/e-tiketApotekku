<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Tiket ApotekKU</title>
<style>
/* ============================================================
   E-TIKET — Design tokens
   Palette : ink #131A26 / paper #F4F6F9 / surface #FFFFFF
             queue-blue #2E5BFF / amber #E8930C / green #12A150
             red #DC3D43
   Type    : Space Grotesk (display) / Inter (body) / JetBrains Mono (nomor tiket)
   Signature: kartu tiket antrean dengan garis perforasi + nomor mono besar,
              progress dot-bar-dot
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap');

:root {
  --ink: #131A26;
  --ink-2: #4A5568;
  --ink-3: #8A94A6;
  --paper: #F4F6F9;
  --surface: #FFFFFF;
  --line: #E2E7EF;
  --brand: #E1000F;
  --brand-soft: #FCE6E8;
  --brand-deep: #8C0A12;
  --blue: #2E5BFF;
  --blue-soft: #EAF0FF;
  --amber: #E8930C;
  --amber-soft: #FDF3E1;
  --green: #12A150;
  --green-soft: #E4F5EC;
  --red: #DC3D43;
  --red-soft: #FCEAEA;
  --violet: #6E56CF;
  --violet-soft: #F1EDFB;
  --radius: 12px;
  --shadow: 0 1px 2px rgba(19, 26, 38, .05), 0 4px 16px rgba(19, 26, 38, .06);
  --font-display: 'Space Grotesk', sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
[hidden] { display: none !important; }

html, body { height: 100%; }

body {
  font-family: var(--font-body);
  background: var(--paper);
  color: var(--ink);
  font-size: 14.5px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3 { font-family: var(--font-display); letter-spacing: -.01em; }

a { color: var(--brand); text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }

/* ---------- Login ---------- */
.login-wrap {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
  background:
    radial-gradient(circle at 15% 20%, rgba(225, 0, 15, .06), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(225, 0, 15, .04), transparent 45%),
    var(--paper);
}

.login-card {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 16px;
  box-shadow: var(--shadow);
  padding: 36px 32px;
}

.brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-display); font-weight: 700; font-size: 20px;
}
.brand .brand-mark {
  width: 34px; height: 34px; border-radius: 9px;
  background: var(--ink); color: #fff;
  display: grid; place-items: center;
  font-family: var(--font-mono); font-size: 15px;
}
.login-card h1 { font-size: 22px; margin: 22px 0 4px; }
.login-card .sub { color: var(--ink-3); margin-bottom: 22px; }

/* ---------- Form ---------- */
.field { margin-bottom: 16px; }
.field label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 6px; }
.field input, .field select, .field textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 9px;
  padding: 10px 12px;
  font: inherit;
  background: var(--surface);
  color: var(--ink);
  transition: border-color .15s;
}
.field textarea { resize: vertical; min-height: 96px; }
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--brand); outline: none; box-shadow: 0 0 0 3px var(--brand-soft);
}
.hint { font-size: 12px; color: var(--ink-3); margin-top: 5px; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  border: 1px solid transparent;
  border-radius: 9px;
  padding: 10px 16px;
  font-weight: 600; font-size: 14px;
  transition: filter .15s, background .15s;
}
.btn:hover { filter: brightness(1.06); }
.btn-primary { background: var(--brand-deep); color: #fff; }
.btn-blue { background: var(--brand); color: #fff; }
.btn-green { background: var(--green); color: #fff; }
.btn-danger { background: var(--red-soft); color: var(--red); }
.btn-ghost { background: transparent; border-color: var(--line); color: var(--ink-2); }
.btn-block { width: 100%; }
.btn-sm { padding: 6px 11px; font-size: 12.5px; border-radius: 7px; }
.btn:disabled { opacity: .5; cursor: not-allowed; filter: none; }

.alert { border-radius: 9px; padding: 10px 12px; font-size: 13px; margin-bottom: 14px; display: none; }
.alert.show { display: block; }
.alert-error { background: var(--red-soft); color: var(--red); }
.alert-ok { background: var(--green-soft); color: var(--green); }

/* ---------- App shell ---------- */
.shell { display: flex; min-height: 100vh; }

.sidebar {
  width: 230px; flex-shrink: 0;
  background: var(--brand-deep); color: #F3C6C9;
  display: flex; flex-direction: column;
  padding: 20px 14px;
  position: sticky; top: 0; height: 100vh;
}
.sidebar .brand { color: #fff; padding: 0 10px 20px; }
.sidebar .brand .brand-mark { background: #fff; }
.role-chip {
  margin: 0 10px 18px;
  font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
  color: #F0A6AB;
}
.nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.nav button {
  display: flex; align-items: center; gap: 10px;
  background: none; border: none; color: inherit;
  padding: 10px 12px; border-radius: 8px;
  font-size: 14px; font-weight: 500; text-align: left;
  transition: background .15s;
}
.nav button:hover { background: rgba(255, 255, 255, .07); }
.nav button.active { background: var(--brand); color: #fff; }
.sidebar .logout-btn { color: #FFD9DB; }

.main { flex: 1; padding: 28px 32px; max-width: 1240px; }
.page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 22px; flex-wrap: wrap; }
.page-head h1 { font-size: 24px; }
.page-head .sub { color: var(--ink-3); margin-top: 2px; }

/* ---------- Stat cards ---------- */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
.stat {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
  padding: 16px 18px; box-shadow: var(--shadow);
}
.stat .label { font-size: 12px; font-weight: 600; color: var(--ink-3); text-transform: uppercase; letter-spacing: .06em; }
.stat .value { font-family: var(--font-mono); font-size: 30px; font-weight: 700; margin-top: 4px; }
.stat.accent-blue .value { color: var(--brand); }
.stat.accent-amber .value { color: var(--amber); }
.stat.accent-green .value { color: var(--green); }
.stat.accent-violet .value { color: var(--violet); }

/* ---------- Panels & tables ---------- */
.panel {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 22px; overflow: hidden;
}
.panel-head {
  padding: 14px 18px; border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
}
.panel-head h2 { font-size: 16px; }
.panel-body { padding: 18px; }

table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
th {
  text-align: left; font-size: 11.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
  color: var(--ink-3); padding: 10px 14px; border-bottom: 1px solid var(--line); white-space: nowrap;
}
td { padding: 11px 14px; border-bottom: 1px solid var(--line); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tbody tr:hover { background: #FAFBFD; }

.empty { text-align: center; color: var(--ink-3); padding: 34px 16px; }

/* ---------- Badges ---------- */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11.5px; font-weight: 600; padding: 3px 9px; border-radius: 99px; white-space: nowrap;
}
.badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.b-waiting { background: var(--amber-soft); color: var(--amber); }
.b-active { background: var(--brand-soft); color: var(--brand); }
.b-done { background: var(--green-soft); color: var(--green); }
.b-urgent { background: var(--red-soft); color: var(--red); }
.b-high { background: var(--amber-soft); color: var(--amber); }
.b-normal { background: var(--blue-soft); color: #1D46CC; }
.b-low { background: #EEF1F6; color: var(--ink-2); }

.ticket-no { font-family: var(--font-mono); font-weight: 700; font-size: 13px; }

/* ---------- Kartu tiket (signature) ---------- */
.ticket-card {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 16px; overflow: visible; /* agar dropdown tidak terpotong */
  display: grid; grid-template-columns: 150px 1fr; position: relative;
}
.ticket-stub { border-radius: calc(var(--radius) - 1px) 0 0 calc(var(--radius) - 1px); }
.ticket-stub {
  background: var(--brand); color: #fff; padding: 18px 14px;
  display: flex; flex-direction: column; justify-content: space-between; gap: 12px;
  border-right: 2px dashed rgba(255, 255, 255, .35);
  position: relative;
}
.ticket-stub::before, .ticket-stub::after {
  content: ''; position: absolute; right: -9px; width: 16px; height: 16px;
  border-radius: 50%; background: var(--paper);
}
.ticket-stub::before { top: -8px; }
.ticket-stub::after { bottom: -8px; }
.ticket-stub .q-label { font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: #FFD0D3; }
.ticket-stub .q-no { font-family: var(--font-mono); font-size: 24px; font-weight: 700; line-height: 1.15; word-break: break-all; }
.ticket-stub .q-order { font-family: var(--font-mono); font-size: 12px; color: #FFD0D3; }
.ticket-body { padding: 16px 18px; }
.ticket-body .req { font-weight: 600; margin: 6px 0 10px; }
.ticket-meta { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12.5px; color: var(--ink-2); }
.ticket-meta b { color: var(--ink); }
.ticket-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }

/* ---------- Progress dot-bar-dot ---------- */
.progress-track { display: flex; align-items: center; margin: 16px 0 6px; }
.p-dot {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid var(--line); background: var(--surface);
  display: grid; place-items: center; position: relative;
}
.p-dot .p-label {
  position: absolute; top: 27px; left: 50%; transform: translateX(-50%);
  font-size: 11px; font-weight: 600; color: var(--ink-3); white-space: nowrap;
}
.p-bar { height: 3px; flex: 1; background: var(--line); }
.p-dot.done { border-color: var(--green); background: var(--green); color: #fff; }
.p-dot.done .p-label { color: var(--green); }
.p-dot.current { border-color: var(--brand); background: var(--brand-soft); }
.p-dot.current::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--brand); }
.p-dot.current .p-label { color: var(--brand); }
.p-bar.done { background: var(--green); }
.progress-track + .progress-space { height: 26px; }

/* ---------- Log ---------- */
.log-list { list-style: none; }
.log-list li {
  display: flex; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--line); font-size: 13px;
}
.log-list li:last-child { border-bottom: none; }
.log-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--brand); margin-top: 6px; flex-shrink: 0; }
.log-time { color: var(--ink-3); font-size: 12px; font-family: var(--font-mono); white-space: nowrap; }

/* ---------- Modal ---------- */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(19, 26, 38, .45);
  display: none; place-items: center; z-index: 50; padding: 20px;
}
.modal-backdrop.show { display: grid; }
.modal {
  background: var(--surface); border-radius: 14px; box-shadow: var(--shadow);
  width: 100%; max-width: 440px; padding: 24px;
}
.modal h3 { font-size: 17px; margin-bottom: 14px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

.toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.toolbar select { border: 1px solid var(--line); border-radius: 8px; padding: 7px 10px; font: inherit; background: var(--surface); }

/* ---------- Responsive ---------- */
@media (max-width: 860px) {
  .shell { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: static; flex-direction: row; align-items: center; flex-wrap: wrap; gap: 8px; padding: 12px; }
  .sidebar .brand { padding: 0 8px; }
  .role-chip { margin: 0 8px; }
  .nav { flex-direction: row; flex-wrap: wrap; }
  .main { padding: 18px 14px; }
  .ticket-card { grid-template-columns: 1fr; }
  .ticket-stub { flex-direction: row; align-items: center; border-right: none; border-bottom: 2px dashed rgba(255,255,255,.35); border-radius: calc(var(--radius) - 1px) calc(var(--radius) - 1px) 0 0; }
  .ticket-stub::before { top: auto; bottom: -8px; left: -8px; right: auto; }
  .ticket-stub::after { bottom: -8px; right: -8px; }
  .table-scroll { overflow-x: auto; }
}
.table-scroll { overflow-x: auto; }


/* ---------- Animasi ---------- */
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
@keyframes scaleIn { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: none; } }
@keyframes popIn { from { opacity: 0; transform: translateY(-6px) scale(.9); } to { opacity: 1; transform: none; } }
@keyframes pulseDot { 0%, 100% { box-shadow: 0 0 0 0 rgba(225, 0, 15, .35); } 50% { box-shadow: 0 0 0 6px rgba(225, 0, 15, 0); } }
@keyframes bellRing { 0%, 100% { transform: none; } 20% { transform: rotate(12deg); } 40% { transform: rotate(-10deg); } 60% { transform: rotate(6deg); } 80% { transform: rotate(-4deg); } }

.login-card { animation: scaleIn .4s cubic-bezier(.22, 1, .36, 1) both; }
.page-anim > * { animation: fadeUp .38s cubic-bezier(.22, 1, .36, 1) both; }
.page-anim > *:nth-child(2) { animation-delay: .05s; }
.page-anim > *:nth-child(3) { animation-delay: .1s; }
.page-anim > *:nth-child(4) { animation-delay: .15s; }
.page-anim > *:nth-child(5) { animation-delay: .2s; }
.page-anim .stat-grid .stat { animation: fadeUp .4s cubic-bezier(.22, 1, .36, 1) both; }
.page-anim .stat-grid .stat:nth-child(1) { animation-delay: .05s; }
.page-anim .stat-grid .stat:nth-child(2) { animation-delay: .1s; }
.page-anim .stat-grid .stat:nth-child(3) { animation-delay: .15s; }
.page-anim .stat-grid .stat:nth-child(4) { animation-delay: .2s; }
.page-anim .stat-grid .stat:nth-child(5) { animation-delay: .25s; }
.page-anim .stat-grid .stat:nth-child(6) { animation-delay: .3s; }
.page-anim .stat-grid .stat:nth-child(7) { animation-delay: .35s; }

.stat, .ticket-card, .panel { transition: transform .18s ease, box-shadow .18s ease; }
.stat:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(19, 26, 38, .1); }
.ticket-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(19, 26, 38, .12); }
.btn { transition: filter .15s, background .15s, transform .12s ease; }
.btn:active { transform: scale(.96); }
.nav button { transition: background .15s, transform .15s ease; }
.nav button:hover { transform: translateX(3px); }
.nav button.active { transform: none; }
.modal { animation: scaleIn .25s cubic-bezier(.22, 1, .36, 1) both; }
.modal-backdrop.show { animation: fadeUp .2s ease both; }
.p-dot.current { animation: pulseDot 1.8s ease-in-out infinite; }
.nav .notif-count { animation: popIn .3s ease both; }
.notif-item.unread .log-dot, button[data-page="notif"]:hover { animation: bellRing .6s ease; }
.combo-list { animation: popIn .18s ease both; }
.alert.show { animation: fadeUp .3s ease both; }
.badge.b-overdue { animation: pulseDot 2s ease-in-out infinite; }


/* ---------- Dark mode ---------- */
[data-theme="dark"] {
  --paper: #11141B;
  --surface: #1A1F29;
  --line: #2A3140;
  --ink: #E9ECF2;
  --ink-2: #A9B2C2;
  --ink-3: #7B8595;
  --brand-soft: rgba(225, 0, 15, .16);
  --amber-soft: rgba(232, 147, 12, .16);
  --green-soft: rgba(18, 161, 80, .18);
  --red-soft: rgba(220, 61, 67, .2);
  --blue-soft: rgba(46, 91, 255, .18);
  --violet-soft: rgba(110, 86, 207, .2);
  --shadow: 0 1px 2px rgba(0, 0, 0, .3), 0 4px 16px rgba(0, 0, 0, .35);
}
[data-theme="dark"] tbody tr:hover { background: #202634; }
[data-theme="dark"] .b-low, [data-theme="dark"] .b-cancelled { background: #262D3B; color: var(--ink-2); }
[data-theme="dark"] .login-wrap {
  background:
    radial-gradient(circle at 15% 20%, rgba(225, 0, 15, .12), transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(225, 0, 15, .07), transparent 45%),
    var(--paper);
}
[data-theme="dark"] .stat:hover { box-shadow: 0 6px 20px rgba(0, 0, 0, .45); }
[data-theme="dark"] .ticket-card:hover { box-shadow: 0 8px 24px rgba(0, 0, 0, .5); }
.theme-fab {
  position: fixed; top: 14px; right: 14px; z-index: 60;
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid var(--line); background: var(--surface); color: var(--ink);
  font-size: 17px; box-shadow: var(--shadow); cursor: pointer;
  transition: transform .15s ease;
}
.theme-fab:hover { transform: rotate(20deg) scale(1.08); }

/* ---------- Grafik tren ---------- */
.trend { display: flex; gap: 14px; align-items: stretch; height: 200px; padding-top: 6px; }
.trend-col { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 0; }
.trend-val { font-family: var(--font-mono); font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.trend-bar-wrap { flex: 1; width: 100%; max-width: 58px; display: flex; align-items: flex-end; }
.trend-bar { width: 100%; min-height: 4px; background: var(--brand-soft); border: 1.5px solid var(--brand); border-bottom: none; border-radius: 8px 8px 0 0; position: relative; overflow: hidden; transition: height .5s cubic-bezier(.22, 1, .36, 1); }
.trend-done { position: absolute; bottom: 0; left: 0; right: 0; background: var(--green); opacity: .85; transition: height .5s ease; }
.trend-label { font-size: 11.5px; color: var(--ink-3); margin-top: 6px; white-space: nowrap; }

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}

.pin-display { display: flex; justify-content: center; gap: 10px; margin: 22px 0 18px; }
.pin-digit { width: 44px; height: 52px; border: 1.5px solid var(--line); border-radius: 10px; display: grid; place-items: center; font-family: var(--font-mono); font-size: 22px; font-weight: 700; background: var(--paper); }
.pin-digit.filled { border-color: var(--ink); background: var(--surface); }
.pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.pin-pad button { border: 1px solid var(--line); border-radius: 10px; background: var(--surface); font-family: var(--font-mono); font-size: 19px; font-weight: 700; padding: 13px 0; }
.pin-pad button:hover { background: var(--blue-soft); }
.pin-pad button.pad-action { font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--ink-2); }

/* ---------- Branding ApotekKU ---------- */
.brand img.brand-logo { height: 34px; width: auto; display: block; }
.sidebar .brand { flex-direction: column; align-items: flex-start; gap: 6px; }
.sidebar .brand .brand-logo-wrap { background: #fff; border-radius: 10px; padding: 6px 10px; display: inline-block; }
.brand-tagline { font-family: var(--font-body); font-size: 11px; font-style: italic; font-weight: 600; color: var(--brand); }
.sidebar .brand-tagline { color: #F3C6C9; }

/* ---------- Dropdown sistem dengan pencarian ---------- */
.combo { position: relative; }
.combo input { width: 100%; border: 1px solid var(--line); border-radius: 9px; padding: 10px 36px 10px 12px; font: inherit; background: var(--surface); color: var(--ink); }
.combo input:focus { border-color: var(--brand); outline: none; box-shadow: 0 0 0 3px var(--brand-soft); }
.combo .combo-caret { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--ink-3); pointer-events: none; font-size: 12px; }
.combo-list { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--line); border-radius: 10px; box-shadow: var(--shadow); max-height: 240px; overflow-y: auto; z-index: 30; }
.combo-item { padding: 10px 12px; cursor: pointer; font-size: 13.5px; border-bottom: 1px solid var(--line); }
.combo-item:last-child { border-bottom: none; }
.combo-item:hover, .combo-item.hl { background: var(--brand-soft); color: var(--brand); }
.combo-item b { color: var(--brand); }
.combo-empty { padding: 12px; font-size: 13px; color: var(--ink-3); text-align: center; }


/* ---------- v2: status baru, komentar, notifikasi, lampiran ---------- */
.b-hold { background: var(--amber-soft); color: var(--amber); }
.b-rejected { background: var(--red-soft); color: var(--red); }
.b-cancelled { background: #EEF1F6; color: var(--ink-2); }
.b-overdue { background: var(--red); color: #fff; }
.comments { margin-top: 12px; border-top: 1px dashed var(--line); padding-top: 12px; width: 100%; }
.comment { display: flex; gap: 10px; padding: 8px 0; font-size: 13px; }
.comment .who { font-weight: 600; }
.comment .when { color: var(--ink-3); font-size: 11.5px; font-family: var(--font-mono); white-space: nowrap; }
.comment-box { display: flex; gap: 8px; margin-top: 8px; }
.comment-box input { flex: 1; border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; font: inherit; }
.attach-thumbs { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.attach-thumbs img { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; border: 1px solid var(--line); }
.notif-item { display: flex; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--line); font-size: 13.5px; align-items: flex-start; }
.notif-item:last-child { border-bottom: none; }
.notif-item.unread { background: var(--brand-soft); margin: 0 -18px; padding: 12px 18px; }
.nav .notif-count { background: #fff; color: var(--brand); border-radius: 99px; font-size: 11px; font-weight: 700; padding: 1px 7px; margin-left: auto; }
.sla-note { font-size: 11.5px; color: var(--ink-3); margin-top: 2px; }
/* ---------- Toggle lihat password ---------- */
.pw-wrap { position: relative; }
.pw-wrap input { padding-right: 44px; width: 100%; }
.pw-toggle { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 17px; line-height: 1; color: var(--ink-3); padding: 4px 6px; border-radius: 6px; transition: transform .12s ease; }
.pw-toggle:hover { transform: translateY(-50%) scale(1.15); }
.scombo { vertical-align: middle; position: relative; }
.scombo:focus-within { z-index: 70; }
.combo-list { z-index: 70; }
.ticket-actions .scombo input, .toolbar .scombo input, td .scombo input { padding: 6px 28px 6px 10px; font-size: 12.5px; border-radius: 7px; }
.scombo .combo-list { min-width: 100%; width: max-content; max-width: 320px; }

.demo-banner { background: var(--amber-soft); color: var(--amber); font-size: 12.5px; font-weight: 600; text-align: center; padding: 7px 12px; }
</style>
</head>

function sha256(input) {

  const K = [0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  let H = [0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  const rr = (x, n) => (x >>> n) | (x << (32 - n));
  const bytes = [];
  for (let i = 0; i < str.length; i++) bytes.push(str.charCodeAt(i) & 0xff);
  const bitLen = bytes.length * 8;
  bytes.push(0x80);
  while (bytes.length % 64 !== 56) bytes.push(0);
  for (let i = 7; i >= 0; i--) bytes.push(Math.floor(bitLen / Math.pow(2, i * 8)) & 0xff);
  for (let off = 0; off < bytes.length; off += 64) {
    const w = new Array(64);
    for (let i = 0; i < 16; i++) w[i] = (bytes[off+i*4]<<24)|(bytes[off+i*4+1]<<16)|(bytes[off+i*4+2]<<8)|(bytes[off+i*4+3]);
    for (let i = 16; i < 64; i++) {
      const s0 = rr(w[i-15],7) ^ rr(w[i-15],18) ^ (w[i-15]>>>3);
      const s1 = rr(w[i-2],17) ^ rr(w[i-2],19) ^ (w[i-2]>>>10);
      w[i] = (w[i-16] + s0 + w[i-7] + s1) | 0;
    }
    let a=H[0],b=H[1],c=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
    for (let i = 0; i < 64; i++) {
      const S1 = rr(e,6) ^ rr(e,11) ^ rr(e,25);
      const ch = (e & f) ^ (~e & g);
      const t1 = (h + S1 + ch + K[i] + w[i]) | 0;
      const S0 = rr(a,2) ^ rr(a,13) ^ rr(a,22);
      const maj = (a & b) ^ (a & c) ^ (b & c);
      const t2 = (S0 + maj) | 0;
      h = g; g = f; f = e; e = (d + t1) | 0; d = c; c = b; b = a; a = (t1 + t2) | 0;
    }
    const nh = [a,b,c,d,e,f,g,h];
    H = H.map((x, i) => (x + nh[i]) | 0);
  }
  return H.map(x => (x >>> 0).toString(16).padStart(8, '0')).join('');
}

/* ============================================================
   ADAPTER PENYIMPANAN — localStorage (demo) atau Firebase RTDB
   API: Store.init(cb) / Store.update(map) / Store.pushKey() / Store.increment(path)
   ============================================================ */
const USE_FIREBASE = !!firebaseConfig.apiKey;
let DB = null;

const LocalStore = {
  KEY: 'etiket_db',
  cb: null,
  read() {
    try { return JSON.parse(LS.get(this.KEY)) || null; } catch (e) { return null; }
  },
  write(data) {
    LS.set(this.KEY, JSON.stringify(data));
    if (this.cb) this.cb(data);
  },
  init(cb) {
    this.cb = cb;
    let data = this.read();
    if (!data) { data = JSON.parse(JSON.stringify(SEED)); data.seed_version = SEED_VERSION; LS.set(this.KEY, JSON.stringify(data)); }
    else if ((data.seed_version || 0) < SEED_VERSION) {
      const prevVer = data.seed_version || 0;
      /* Migrasi kumulatif: sistem terbaru, akun divisi resmi, hash password */
      data.systems = JSON.parse(JSON.stringify(SEED.systems));
      for (const uid in data.users) {
        if (data.users[uid].role === 'divisi' && !SEED.users[uid]) delete data.users[uid];
      }
      if (data.users.user_admin && !SEED.users.user_admin) delete data.users.user_admin; /* v6: admin tunggal → 4 admin */
      if (data.users.user_cahya) data.users.user_cahya.superadmin = true; /* v7: Cahya superadmin */
      for (const uid in SEED.users) {
        const old = data.users[uid] || {};
        data.users[uid] = Object.assign({}, SEED.users[uid],
          old.password_hash ? { password_hash: old.password_hash } :
          old.password ? { password: old.password } : {});
      }
      for (const uid in data.users) {
        const u = data.users[uid];
        if (u.password && !u.password_hash) u.password_hash = sha256(u.password);
        delete u.password;
      }
      /* v8: reset password seluruh akun divisi ke default 'apotekku' (admin & CEO tidak tersentuh) */
      if ((prevVer || 0) < 8) {
        for (const uid in data.users) if (data.users[uid].role === 'divisi') data.users[uid].password_hash = '0d9a8b64f1632cb09080b6e301b59010443110849e8a7a5b5289147d55f8ab8e';
      }
      data.seed_version = SEED_VERSION;
      LS.set(this.KEY, JSON.stringify(data));
    }
    window.addEventListener('storage', e => { if (e.key === this.KEY && this.cb) this.cb(this.read()); });
    cb(data);
  },
  async update(map) {
    const data = this.read();
    for (const path in map) {
      const parts = path.split('/').filter(Boolean);
      let node = data;
      for (let i = 0; i < parts.length - 1; i++) {
        if (typeof node[parts[i]] !== 'object' || node[parts[i]] === null) node[parts[i]] = {};
        node = node[parts[i]];
      }
      const last = parts[parts.length - 1];
      if (map[path] === null) delete node[last]; else node[last] = map[path];
    }
    this.write(data);
  },
  pushKey() { return 'k' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); },
  async increment(path) {
    const data = this.read();
    const parts = path.split('/').filter(Boolean);
    let node = data;
    for (let i = 0; i < parts.length - 1; i++) { node[parts[i]] = node[parts[i]] || {}; node = node[parts[i]]; }
    const last = parts[parts.length - 1];
    node[last] = (node[last] || 0) + 1;
    this.write(data);
    return node[last];
  }
};

const FirebaseStore = {
  init(cb) {
    firebase.initializeApp(firebaseConfig);
    DB = firebase.database();
    DB.ref('/').on('value', async snap => {
      let data = snap.val();
      if (!data || !data.users) { await DB.ref('/').update(Object.assign({ seed_version: SEED_VERSION }, SEED)); return; }
      if ((data.seed_version || 0) < SEED_VERSION) {
        const upd = { systems: SEED.systems, seed_version: SEED_VERSION };
        for (const uid in (data.users || {})) {
          const u = data.users[uid];
          if (u.password && !u.password_hash) {
            upd['users/' + uid + '/password_hash'] = sha256(u.password);
            upd['users/' + uid + '/password'] = null;
          }
        }
        for (const uid in SEED.users) if (!data.users[uid]) upd['users/' + uid] = SEED.users[uid];
        if (data.users.user_admin && !SEED.users.user_admin) upd['users/user_admin'] = null; /* v6 */
        if (data.users.user_cahya) upd['users/user_cahya/superadmin'] = true; /* v7 */
        /* v8: reset password seluruh akun divisi ke default 'apotekku' */
        if (((data.seed_version || 0)) < 8) {
          for (const uid in (data.users || {})) if (data.users[uid].role === 'divisi') upd['users/' + uid + '/password_hash'] = '0d9a8b64f1632cb09080b6e301b59010443110849e8a7a5b5289147d55f8ab8e';
        }
        await DB.ref('/').update(upd);
        return;
      }
      cb(data);
    });
  },
  async update(map) { await DB.ref('/').update(map); },
  pushKey() { return DB.ref('tickets').push().key; },
  async increment(path) {
    const tx = await DB.ref(path).transaction(cur => (cur || 0) + 1);
    return tx.snapshot.val();
  }
};

/* ---- Klasifikasi otomatis v2: berbasis skor berbobot ----
   Setiap kata kunci menambah/mengurangi skor; sistem kritikal menambah skor.
   skor >= 6 → urgent, >= 3 → tinggi, <= -3 → rendah, selain itu normal. */
const CLASSIFY_RULES = {
  urgent: { weight: 5, words: ['down', 'mati total', 'mati', 'tidak bisa diakses', 'error total', 'data hilang', 'kebocoran', 'security', 'hack', 'darurat', 'urgent', 'kritis', 'seluruh karyawan', 'semua user', 'semua toko'] },
  high: { weight: 3, words: ['error', 'bug', 'gagal', 'tidak bisa', 'bermasalah', 'lambat', 'timeout', 'salah hitung', 'selisih', 'tidak muncul', 'deadline', 'stok tidak sesuai', 'tidak sinkron'] },
  low: { weight: -3, words: ['ubah warna', 'ganti logo', 'typo', 'salah ketik', 'tampilan', 'saran', 'usulan', 'request fitur', 'penambahan fitur', 'jika sempat', 'tidak urgent', 'nice to have'] },
  criticalSystems: { weight: 3, words: ['pharmapp', 'gaji', 'keuangan', 'finance', 'revenue', 'payment', 'pembayaran', 'kasir', 'pos', 'payroll'] }
};
function autoClassify(requestText, systemName) {
  const text = (requestText || '').toLowerCase();
  const sys = (systemName || '').toLowerCase();
  let score = 0;
  for (const w of CLASSIFY_RULES.urgent.words) if (text.includes(w)) { score += CLASSIFY_RULES.urgent.weight; break; }
  for (const w of CLASSIFY_RULES.high.words) if (text.includes(w)) { score += CLASSIFY_RULES.high.weight; break; }
  for (const w of CLASSIFY_RULES.low.words) if (text.includes(w)) { score += CLASSIFY_RULES.low.weight; break; }
  for (const w of CLASSIFY_RULES.criticalSystems.words) if (sys.includes(w)) { score += CLASSIFY_RULES.criticalSystems.weight; break; }
  if (score >= 6) return 'urgent';
  if (score >= 3) return 'high';
  if (score <= -3) return 'low';
  return 'normal';
}

/* ---- Util ---- */
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function fmtTime(ts) { return ts ? new Date(ts).toLocaleString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '-'; }
function fmtDate(ts) { return ts ? new Date(ts).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }) : '-'; }
function fmtDur(ms) {
  if (ms == null || isNaN(ms) || ms < 0) return '-';
  const m = ms / 60000;
  if (m < 60) return Math.round(m) + ' mnt';
  const h = m / 60;
  if (h < 48) return h.toFixed(1) + ' jam';
  return (h / 24).toFixed(1) + ' hari';
}
function avg(arr) { return arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : null; }
function badge(cls, label) { return `<span class="badge ${cls}">${esc(label)}</span>`; }
function statusBadge(t) { return badge(STATUS_BADGE[t.status] || 'b-low', STATUS_LABEL[t.status] || t.status); }
function effectivePriority(t) { return t.admin_classification || t.auto_classification || 'normal'; }
function priorityBadge(t) { const p = effectivePriority(t); return badge(PRIORITY_BADGE[p], PRIORITY_LABEL[p]); }
function isOverdue(t) { return t.status === 'in_progress' && t.deadline && t.deadline < NOW(); }
function overdueBadge(t) { return isOverdue(t) ? badge('b-overdue', 'Terlambat') : ''; }
function isClosed(t) { return ['done', 'rejected', 'cancelled'].includes(t.status); }
function ticketList() {
  return Object.values(DATA.tickets || {}).filter(t => !t.deleted_at).sort((a, b) => {
    const sw = STATUS_WEIGHT[a.status] - STATUS_WEIGHT[b.status];
    if (sw !== 0) return sw;
    if (a.queue_order != null && b.queue_order != null && a.queue_order !== b.queue_order) return a.queue_order - b.queue_order;
    const pw = PRIORITY_WEIGHT[effectivePriority(a)] - PRIORITY_WEIGHT[effectivePriority(b)];
    return pw !== 0 ? pw : (a.created_at || 0) - (b.created_at || 0);
  });
}
function activeQueue() { return ticketList().filter(t => !isClosed(t)); }
function adminUsers() { return Object.entries(DATA.users || {}).filter(([, u]) => u.role === 'admin'); }
function isSuper() { return !!(SESSION && (DATA.users[SESSION.user_id] || {}).superadmin); }
function superIds() { return adminUsers().filter(([, u]) => u.superadmin).map(([id]) => id); }
/* Tiket yang boleh dilihat admin: superadmin = semua; admin biasa = antrian PIC-nya + tiket tanpa PIC */
function adminVisible(list) {
  if (SESSION.role !== 'admin' || isSuper()) return list;
  return list.filter(t => t.assigned_to === SESSION.user_id || !t.assigned_to);
}
/* Notifikasi terkait tiket utk sisi admin: PIC tiket + semua superadmin (fallback: semua admin) */

function renderProgressBar(currentStep) {
  const idx = Math.max(0, PROGRESS_STEPS.indexOf(currentStep));
  let html = '<div class="progress-track">';
  PROGRESS_STEPS.forEach((step, i) => {
    let cls = '';
    if (i < idx) cls = 'done';
    else if (i === idx) cls = currentStep === 'Release' ? 'done' : 'current';
    html += `<div class="p-dot ${cls}">${cls === 'done' ? '✓' : ''}<span class="p-label">${step}</span></div>`;
    if (i < PROGRESS_STEPS.length - 1) html += `<div class="p-bar ${i < idx ? 'done' : ''}"></div>`;
  });
  return html + '</div><div class="progress-space"></div>';
}

/* ---- Login username + password (dibandingkan sebagai hash SHA-256) ---- */
function checkPassword(u, password) {
  if (u.password_hash) return sha256(password) === u.password_hash;
  return u.password === password; /* akun lama: fallback, di-upgrade saat login */
}
function tryLogin() {
  const username = document.getElementById('loginUsername').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;
  const a = document.getElementById('loginAlert');
  a.classList.remove('show');
  if (!username || !password) { a.textContent = 'Username dan password wajib diisi.'; a.classList.add('show'); return; }
  let found = null;
  for (const id in DATA.users) {
    const u = DATA.users[id];
    if (u && String(u.username || '').toLowerCase() === username && checkPassword(u, password)) { found = { user_id: id, ...u }; break; }
  }
  if (!found) { a.textContent = 'Username atau password salah.'; a.classList.add('show'); return; }
  if (!found.password_hash) { /* upgrade akun lama ke hash */
    Store.update({ [`users/${found.user_id}/password_hash`]: sha256(password), [`users/${found.user_id}/password`]: null });
  }
  SESSION = { user_id: found.user_id, name: found.name, role: found.role, division_name: found.division_name || found.name };
  saveSession(SESSION);
  document.getElementById('loginPassword').value = '';
  ACTIVE_PAGE = 'dashboard';
  PAGE_ANIM = true;
  renderRoot();
}
document.getElementById('btnLogin').addEventListener('click', tryLogin);

/* ---- Nomor WhatsApp ---- */
function normalizeWa(raw) {
  let d = String(raw || '').replace(/[^0-9]/g, '');
  if (!d) return '';
  if (d.startsWith('0')) d = '62' + d.slice(1);
  if (!d.startsWith('62')) d = '62' + d;
  return d;
}
function isValidWa(raw) {
  const d = normalizeWa(raw);
  return d.length >= 10 && d.length <= 15;
}
function waLink(num) {
  return `<a href="https://wa.me/${esc(num)}" target="_blank" rel="noopener" style="color:var(--brand)">+${esc(num)}</a>`;
}

function onAttachChange(input) {
  const files = Array.from(input.files || []).slice(0, MAX_ATTACH);
  PENDING_ATTACH = [];
  const info = document.getElementById('attachInfo');
  let pending = files.length;
  if (!pending) { info.textContent = ''; return; }
  files.forEach(f => {
    if (!f.type.startsWith('image/')) { pending--; info.textContent = 'Hanya file gambar yang didukung.'; return; }
    if (f.size > MAX_ATTACH_BYTES) { pending--; info.textContent = `File ${f.name} melebihi 400 KB, dilewati.`; return; }
    const r = new FileReader();
    r.onload = () => {
      PENDING_ATTACH.push({ name: f.name, type: f.type, data: r.result });
      pending--;
      if (pending <= 0) info.textContent = PENDING_ATTACH.length + ' gambar siap dilampirkan.';
    };
    r.readAsDataURL(f);
  });
}
function attachThumbs(t) {
  const list = t.attachments || [];
  if (!list.length) return '';
  return `<div class="attach-thumbs">${list.map((a, i) =>

}

    ['Rata-rata waktu tunggu (masuk → accept)', fmtDur(avg(waitTimes))],

  const ws1 = XLSX.utils.aoa_to_sheet([head, ...rows]);
  ws1['!cols'] = [{ wch: 12 }, { wch: 34 }, { wch: 16 }, { wch: 30 }, { wch: 50 }, { wch: 11 }, { wch: 11 }, { wch: 10 }, { wch: 18 }, { wch: 19 }, { wch: 19 }, { wch: 13 }, { wch: 19 }];

  ws2['!cols'] = [{ wch: 44 }, { wch: 12 }, { wch: 10 }, { wch: 24 }];

function exportCsv() {
  const sep = ';';
  const { head, rows } = exportRows();
  const q = v => '"' + String(v ?? '').replace(/"/g, '""') + '"';
  const csv = '\uFEFF' + [head, ...rows].map(r => r.map(q).join(sep)).join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
  a.download = 'e-tiket-apotekku-' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

  const waNumber = waRaw ? normalizeWa(waRaw) : null;
  const priority = autoClassify(reqText, systemName);
  const pic = picNameOf(systemId); /* PIC otomatis mengikuti sistem yang dipilih */

  SELECTED_SYS = null;
  renderPage();

}
async function batalkanTiket(id) {

async function changeClassification(id, value) {
  const t = DATA.tickets[id]; if (!t) return;
  await Store.update({
    [`tickets/${id}/admin_classification`]: value,
    [`tickets/${id}/priority`]: value,
    [`tickets/${id}/queue_order`]: PRIORITY_WEIGHT[value] * 100000 + ((t.queue_order || 0) % 100000),
    [`tickets/${id}/updated_at`]: NOW()
  });
  await logActivity('CLASSIFICATION_CHANGED', id, `Klasifikasi tiket ${t.ticket_number} diubah admin menjadi ${PRIORITY_LABEL[value]}`);
}
async function moveTicket(id, dir) {
  const list = activeQueue();
  const idx = list.findIndex(t => t.ticket_id === id);
  const other = list[idx + dir];
  if (idx < 0 || !other) return;
  const t = list[idx];
  await Store.update({
    [`tickets/${t.ticket_id}/queue_order`]: other.queue_order,
    [`tickets/${other.ticket_id}/queue_order`]: t.queue_order
  });
  await logActivity('QUEUE_REORDERED', id, `Urutan tiket ${t.ticket_number} diubah admin`);
}

  });

async function saveReject() {
  const reason = document.getElementById('mrReason').value.trim();
  if (!reason || !REJECT_ID) return;
  const t = DATA.tickets[REJECT_ID];
  const updates = {
    [`tickets/${t.ticket_id}/status`]: 'rejected',
    [`tickets/${t.ticket_id}/reject_reason`]: reason,
    [`tickets/${t.ticket_id}/updated_at`]: NOW()
  };
  requeue(updates, t.ticket_id);
  await Store.update(updates);
  await logActivity('TICKET_REJECTED', t.ticket_id, `Tiket ${t.ticket_number} ditolak admin: ${reason}`);

async function toggleHold(id) {
  const t = DATA.tickets[id]; if (!t) return;
  const toHold = t.status === 'in_progress';
  await Store.update({ [`tickets/${id}/status`]: toHold ? 'on_hold' : 'in_progress', [`tickets/${id}/updated_at`]: NOW() });
  await logActivity(toHold ? 'TICKET_ON_HOLD' : 'TICKET_RESUMED', id, `Tiket ${t.ticket_number} ${toHold ? 'ditunda' : 'dilanjutkan'} admin`);
  await notify([t.division_id], `${toHold ? '⏸' : '▶'} Tiket ${t.ticket_number} ${toHold ? 'ditunda sementara' : 'dilanjutkan kembali'}.`, id);
}
async function reassign(id, adminId) {
  const t = DATA.tickets[id]; if (!t) return;
  const u = DATA.users[adminId]; if (!u) return;
  await Store.update({ [`tickets/${id}/assigned_to`]: adminId, [`tickets/${id}/assigned_name`]: u.name, [`tickets/${id}/updated_at`]: NOW() });
  await logActivity('TICKET_REASSIGNED', id, `PIC tiket ${t.ticket_number} diganti menjadi ${u.name}`);
  await notify([adminId], `📌 Anda ditugaskan sebagai PIC tiket ${t.ticket_number} (${t.division_name}).`, id);
}
async function advanceProgress(id) {
  const t = DATA.tickets[id]; if (!t) return;
  const idx = PROGRESS_STEPS.indexOf(t.current_progress);
  const next = PROGRESS_STEPS[idx + 1]; if (!next) return;
  const isLast = next === PROGRESS_STEPS[PROGRESS_STEPS.length - 1];
  const upd = {
    [`tickets/${id}/current_progress`]: next,
    [`tickets/${id}/status`]: isLast ? 'done' : 'in_progress',
    [`tickets/${id}/updated_at`]: NOW()
  };
  if (isLast) upd[`tickets/${id}/done_at`] = NOW();
  await Store.update(upd);
  await logActivity('PROGRESS_UPDATED', id, `Status tiket ${t.ticket_number} diperbarui ke tahap ${next}`);
  if (isLast) {
    await logActivity('TICKET_DONE', id, `Tiket ${t.ticket_number} selesai (Release)`);
    await notify([t.division_id], `🎉 Tiket ${t.ticket_number} selesai (Release)!`, id);
  } else {
    await notify([t.division_id], `→ Tiket ${t.ticket_number} masuk tahap ${next}.`, id);
  }
}
async function deleteTicket(id) {
  const t = DATA.tickets[id];
  if (!t || !confirm(`Hapus tiket ${t.ticket_number}? Nomor antrean tiket lain akan disesuaikan otomatis.`)) return;
  const updates = { [`tickets/${id}/deleted_at`]: NOW(), [`tickets/${id}/updated_at`]: NOW() };
  requeue(updates, id);
  await Store.update(updates);
  await logActivity('TICKET_DELETED', id, `Tiket ${t.ticket_number} dihapus admin, antrean disesuaikan otomatis`);
}

function countBy(list, fn) {
  const map = {};
  list.forEach(t => { const k = fn(t) || '-'; map[k] = (map[k] || 0) + 1; });
  return Object.entries(map).sort((a, b) => b[1] - a[1]);
}
function breakdown(title, entries) {
  const max = entries.length ? entries[0][1] : 1;
  return `<div class="panel"><div class="panel-head"><h2>${title}</h2></div><div class="panel-body">
    ${entries.length ? entries.map(([k, v]) => `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${esc(k)}</span><b class="ticket-no">${v}</b></div>
      <div style="height:6px;background:var(--line);border-radius:99px;overflow:hidden"><div style="height:100%;width:${Math.round(v / max * 100)}%;background:var(--brand);border-radius:99px"></div></div>
    </div>`).join('') : '<p class="empty">Belum ada data.</p>'}</div></div>`;
}
function trendChart(list) {
  const months = [];
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({ key: d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'),
      label: d.toLocaleDateString('id-ID', { month: 'short', year: '2-digit' }), total: 0, done: 0 });
  }
  const idx = {};
  months.forEach((mo, i) => { idx[mo.key] = i; });
  list.forEach(t => {
    const d = new Date(t.created_at);
    const k = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    if (k in idx) { months[idx[k]].total++; if (t.status === 'done') months[idx[k]].done++; }
  });
  const max = Math.max(1, ...months.map(mo => mo.total));
  return `<div class="panel"><div class="panel-head"><h2>Tren tiket per bulan</h2>
      <span class="hint"><span style="color:var(--brand)">■</span> total &nbsp; <span style="color:var(--green)">■</span> selesai</span></div>
    <div class="panel-body"><div class="trend">
      ${months.map(mo => `<div class="trend-col">
        <div class="trend-val">${mo.total}</div>
        <div class="trend-bar-wrap"><div class="trend-bar" style="height:${Math.round(mo.total / max * 100)}%">
          <div class="trend-done" style="height:${mo.total ? Math.round(mo.done / mo.total * 100) : 0}%"></div>
        </div></div>
        <div class="trend-label">${mo.label}</div>
      </div>`).join('')}
    </div></div></div>`;
}

function scomboFilter(root) {

    if (q) {
      const at = i.name.toLowerCase().indexOf(q);
      if (at >= 0) label = esc(i.name.slice(0, at)) + '<b>' + esc(i.name.slice(at, at + q.length)) + '</b>' + esc(i.name.slice(at + q.length));
    }
    return `<div class="combo-item" data-id="${esc(String(i.id))}" data-name="${esc(i.name)}">${label}</div>`;
  }).join('') : '<div class="combo-empty">Tidak ditemukan.</div>';
  list.hidden = false;
}
function scomboPick(root, id, name) {
  const reg = COMBOS[root.dataset.cid];
  const input = root.querySelector('input');
  input.value = name;
  input.dataset.selid = id;
  root.querySelector('.combo-list').hidden = true;
  if (reg && reg.onPick) reg.onPick(id, name);
}
document.addEventListener('focusin', e => {
  const r = e.target.closest('.scombo');
  if (r && e.target.tagName === 'INPUT') { e.target.select(); scomboFilter(r); }
});
document.addEventListener('input', e => {
  const r = e.target.closest('.scombo');
  if (r && e.target.tagName === 'INPUT') { e.target.dataset.selid = ''; scomboFilter(r); }
});
document.addEventListener('mousedown', e => {
  const item = e.target.closest('.scombo .combo-item');
  if (item) { e.preventDefault(); scomboPick(item.closest('.scombo'), item.dataset.id, item.dataset.name); }
});
document.addEventListener('keydown', e => {
  const r = e.target.closest && e.target.closest('.scombo');
  if (!r) return;
  const list = r.querySelector('.combo-list');
  if (e.key === 'Enter') {
    const first = list.querySelector('.combo-item');
    if (first && !list.hidden) { e.preventDefault(); scomboPick(r, first.dataset.id, first.dataset.name); }
  } else if (e.key === 'Escape') list.hidden = true;
});
document.addEventListener('click', e => {
  document.querySelectorAll('.scombo .combo-list').forEach(l => {
    if (!l.closest('.scombo').contains(e.target)) l.hidden = true;
  });
});

/* Item-item siap pakai */
function adminItems(withNone, noneLabel) {
  const items = adminUsers().map(([id, u]) => ({ id, name: u.name }));
  return withNone ? [{ id: '', name: noneLabel || '— tanpa PIC —' }, ...items] : items;
}
function priorityItems() { return ['urgent', 'high', 'normal', 'low'].map(v => ({ id: v, name: PRIORITY_LABEL[v] })); }
function divisionItems() { return DIVISIONS.map(d => ({ id: d, name: d })); }
function picNameOf(systemId) {
  const pic = (DATA.systems[systemId] || {}).pic;
  return pic && DATA.users[pic] ? { id: pic, name: DATA.users[pic].name } : null;
}
function onPickSystem(id, name) {
  SELECTED_SYS = { id, name };
  const info = document.getElementById('picInfo');
  if (!info) return;
  const pic = picNameOf(id);
  info.innerHTML = pic
    ? `PIC sistem ini: <b>${esc(pic.name)}</b> — tiket Anda otomatis masuk antrian ${esc(pic.name)}.`
    : 'Sistem ini belum memiliki PIC — tiket akan ditangani tim admin.';
}

/* ================= PENGATURAN AKUN ================= */
function renderAkun(m) {
  m.innerHTML = `
    <div class="page-head"><div><h1>Pengaturan Akun</h1></div></div>
    <div class="panel" style="max-width:480px"><div class="panel-body">
      <div id="akunAlert" class="alert"></div>
      ${SESSION.role === 'divisi'
        ? `<div class="field"><label>Nama divisi</label>
            ${comboField('accDiv', divisionItems(), SESSION.division_name, null, 'Cari divisi...')}
            <p class="hint">Pilih sesuai divisi resmi ApotekKU.</p></div>`
        : `<div class="field"><label>Nama</label><input id="accName" value="${esc(SESSION.name)}"></div>`}
      <div class="field"><label>Username</label><input id="accUsername" value="${esc((DATA.users[SESSION.user_id] || {}).username || '')}" disabled></div>
      <div class="field"><label>Password baru (opsional)</label>
        <span class="pw-wrap"><input type="password" id="accPass" placeholder="Minimal 6 karakter, kosongkan jika tidak diubah"><button type="button" class="pw-toggle" onclick="togglePw('accPass', this)" aria-label="Lihat password">👁️</button></span></div>
      <button class="btn btn-primary" onclick="saveAkun()">Simpan perubahan</button>
    </div></div>
    ${SESSION.role === 'admin' && isSuper() ? umPanelHtml() + sysPanelHtml() : ''}`;
}
async function saveAkun() {
  const a = document.getElementById('akunAlert');
  const isDivisi = SESSION.role === 'divisi';
  const division = isDivisi ? comboVal('accDiv') : '';
  const name = isDivisi ? division : document.getElementById('accName').value.trim();
  const newPass = document.getElementById('accPass').value;
  try {
    if (newPass && newPass.length < 6) throw new Error('Password minimal 6 karakter.');
    const updates = { [`users/${SESSION.user_id}/updated_at`]: NOW() };
    if (name) updates[`users/${SESSION.user_id}/name`] = name;
    if (isDivisi && division) updates[`users/${SESSION.user_id}/division_name`] = division;
    if (newPass) {
      updates[`users/${SESSION.user_id}/password_hash`] = sha256(newPass);
      updates[`users/${SESSION.user_id}/password`] = null;
    }
    await Store.update(updates);
    if (name) {
      SESSION.name = name;
      if (isDivisi && division) SESSION.division_name = division;
      saveSession(SESSION);
      renderNav();
    }
    a.textContent = 'Perubahan tersimpan.'; a.className = 'alert alert-ok show';
    document.getElementById('accPass').value = '';
  } catch (e) {
    a.textContent = 'Gagal menyimpan: ' + e.message; a.className = 'alert alert-error show';
  }
}

/* ================= Kelola akun pengguna (khusus admin) ================= */
function umPanelHtml() {
  const u = UM_EDIT_ID ? (DATA.users[UM_EDIT_ID] || {}) : {};
  const role = u.role || 'divisi';
  const rows = Object.entries(DATA.users || {}).sort((a, b) => {
    const order = { divisi: 0, admin: 1, viewer: 2 };
    return (order[a[1].role] - order[b[1].role]) || String(a[1].name).localeCompare(b[1].name);
  }).map(([id, x]) => `<tr>
    <td>${esc(x.role === 'divisi' && x.division_name ? x.division_name : x.name)}</td>
    <td class="ticket-no">${esc(x.username || '-')}</td>
    <td>${badge(x.role === 'admin' ? 'b-urgent' : x.role === 'viewer' ? 'b-low' : 'b-active', x.role)}</td>
    <td style="text-align:right;white-space:nowrap">
      <button class="btn btn-ghost btn-sm" onclick="umEdit('${id}')">Edit</button>
      ${id !== SESSION.user_id ? `<button class="btn btn-danger btn-sm" onclick="umDelete('${id}')">Hapus</button>` : ''}
    </td></tr>`).join('');
  return `
    <div class="panel" style="max-width:640px">
      <div class="panel-head"><h2>Kelola akun pengguna (semua divisi)</h2></div>
      <div class="panel-body">
        <div id="umAlert" class="alert"></div>
        <div class="field"><label>Role</label>
          ${(UM_ROLE = role, comboField('umRole', [{ id: 'divisi', name: 'Divisi' }, { id: 'admin', name: 'Admin' }, { id: 'viewer', name: 'Viewer' }], role, umSetRole, 'Pilih role...'))}</div>
        <div class="field" id="umDivisionField" ${role !== 'divisi' ? 'hidden' : ''}><label>Nama divisi</label>
          ${comboField('umDiv', divisionItems(), u.division_name, null, 'Cari divisi...')}</div>
        <div class="field" id="umNameField" ${role === 'divisi' ? 'hidden' : ''}><label for="umName">Nama</label>
          <input id="umName" value="${role !== 'divisi' ? esc(u.name || '') : ''}" placeholder="cth: Admin IT 2"></div>
        <div class="field" id="umSuperField" ${role !== 'admin' ? 'hidden' : ''}><label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="umSuper" style="width:auto" ${u.superadmin ? 'checked' : ''}> Super admin (lihat semua antrian, monitoring, kelola akun &amp; sistem)</label></div>
        <div class="field"><label for="umUsername">Username</label>
          <input id="umUsername" value="${esc(u.username || '')}" placeholder="huruf kecil tanpa spasi" autocomplete="off"></div>
        <div class="field"><label for="umPassword">Password</label>
          <span class="pw-wrap"><input type="password" id="umPassword" placeholder="Minimal 6 karakter" autocomplete="new-password"><button type="button" class="pw-toggle" onclick="togglePw('umPassword', this)" aria-label="Lihat password">👁️</button></span>
          ${UM_EDIT_ID ? '<p class="hint">Kosongkan jika password tidak diubah.</p>' : ''}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-blue" onclick="umSave()">${UM_EDIT_ID ? 'Simpan perubahan' : '+ Tambah pengguna'}</button>
          ${UM_EDIT_ID ? '<button class="btn btn-ghost" onclick="umCancel()">Batal edit</button>' : ''}
        </div>
        <div class="table-scroll" style="margin-top:18px"><table>
          <thead><tr><th>Nama / Divisi</th><th>Username</th><th>Role</th><th style="text-align:right">Aksi</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="4" class="empty">Belum ada pengguna.</td></tr>'}</tbody>
        </table></div>
      </div>
    </div>`;
}
function umSetRole(role) {
  UM_ROLE = role;
  document.getElementById('umDivisionField').hidden = role !== 'divisi';
  document.getElementById('umNameField').hidden = role === 'divisi';
  document.getElementById('umSuperField').hidden = role !== 'admin';
}
function umEdit(id) { UM_EDIT_ID = id; renderPage(); }
function umCancel() { UM_EDIT_ID = ''; renderPage(); }
async function umSave() {
  const a = document.getElementById('umAlert');
  const editingId = UM_EDIT_ID;
  const role = UM_ROLE || 'divisi';
  const division = comboVal('umDiv');
  const name = role === 'divisi' ? division : document.getElementById('umName').value.trim();
  const username = document.getElementById('umUsername').value.trim().toLowerCase();
  const password = document.getElementById('umPassword').value;
  try {
    if (!name) throw new Error('Nama / divisi wajib diisi.');
    if (!/^[a-z0-9._-]{3,}$/.test(username)) throw new Error('Username minimal 3 karakter: huruf kecil, angka, titik, strip, atau underscore.');
    for (const id in DATA.users) {
      if (id !== editingId && String(DATA.users[id].username || '').toLowerCase() === username)
        throw new Error('Username sudah dipakai pengguna lain.');
    }
    if (!editingId && !password) throw new Error('Password wajib diisi untuk pengguna baru.');
    if (password && password.length < 6) throw new Error('Password minimal 6 karakter.');

    if (editingId) {
      const upd = {};
      upd[`users/${editingId}/role`] = role;
      upd[`users/${editingId}/name`] = name;
      upd[`users/${editingId}/username`] = username;
      upd[`users/${editingId}/division_name`] = role === 'divisi' ? division : name;
      upd[`users/${editingId}/superadmin`] = role === 'admin' && document.getElementById('umSuper').checked ? true : null;
      if (password) { upd[`users/${editingId}/password_hash`] = sha256(password); upd[`users/${editingId}/password`] = null; }
      upd[`users/${editingId}/updated_at`] = NOW();
      await Store.update(upd);
      await logActivity('USER_UPDATED', null, `Akun ${username} (${name}) diperbarui admin`);
    } else {
      const id = Store.pushKey();
      await Store.update({ ['users/' + id]: { uid: id, name, role,
        division_name: role === 'divisi' ? division : name,
        superadmin: role === 'admin' && document.getElementById('umSuper').checked ? true : null,
        username, password_hash: sha256(password), created_at: NOW(), updated_at: NOW() } });
      await logActivity('USER_CREATED', null, `Akun baru ${username} (${name}, role ${role}) dibuat admin`);
    }
    UM_EDIT_ID = '';
    renderPage();
    const a2 = document.getElementById('umAlert');
    a2.textContent = editingId ? 'Akun diperbarui.' : 'Pengguna baru ditambahkan.';
    a2.className = 'alert alert-ok show';
  } catch (e) {
    a.textContent = 'Gagal menyimpan: ' + e.message;
    a.className = 'alert alert-error show';
  }
}
async function umDelete(id) {
  const u = DATA.users[id]; if (!u || id === SESSION.user_id) return;
  if (!confirm(`Hapus akun ${u.username} (${u.name})? Pengguna ini tidak akan bisa login lagi.`)) return;
  await Store.update({ ['users/' + id]: null });
  await logActivity('USER_DELETED', null, `Akun ${u.username} (${u.name}) dihapus admin`);
  renderPage();
}


/* ================= Kelola sistem & PIC (khusus admin) ================= */
function sysPanelHtml() {
  const admins = adminUsers();
  const rows = Object.entries(DATA.systems || {}).sort((a, b) => String(a[1].system_name).localeCompare(b[1].system_name))
    .map(([id, x]) => `<tr>
      <td>${esc(x.system_name)}</td>
      <td>${comboField('syspic-' + id, adminItems(true), x.pic || '', v => sysSetPic(id, v), 'Cari PIC...', 'width:180px')}</td>
      <td>${badge(x.status === 'inactive' ? 'b-cancelled' : 'b-done', x.status === 'inactive' ? 'Nonaktif' : 'Aktif')}</td>
      <td style="text-align:right"><button class="btn btn-ghost btn-sm" onclick="sysToggle('${id}')">${x.status === 'inactive' ? 'Aktifkan' : 'Nonaktifkan'}</button></td>
    </tr>`).join('');
  return `
    <div class="panel" style="max-width:640px">
      <div class="panel-head"><h2>Kelola sistem &amp; PIC</h2></div>
      <div class="panel-body">
        <p class="hint" style="margin-bottom:12px">PIC sistem menjadi penanggung jawab default saat tiket di-accept dan menerima notifikasi bertarget 🎯 saat tiket baru masuk untuk sistemnya.</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
          <input id="newSysName" placeholder="Nama sistem baru" style="flex:1;min-width:180px;border:1px solid var(--line);border-radius:9px;padding:9px 12px;font:inherit">
          ${comboField('newSysPic', adminItems(true), '', null, 'PIC sistem baru...', 'width:190px')}
          <button class="btn btn-blue btn-sm" onclick="sysAdd()">+ Tambah</button>
        </div>
        <div class="table-scroll"><table>
          <thead><tr><th>Sistem</th><th>PIC</th><th>Status</th><th style="text-align:right">Aksi</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="4" class="empty">Belum ada sistem.</td></tr>'}</tbody>
        </table></div>
      </div>
    </div>`;
}
async function sysSetPic(id, adminId) {
  const x = DATA.systems[id]; if (!x) return;
  await Store.update({ [`systems/${id}/pic`]: adminId || null });
  const picName = adminId && DATA.users[adminId] ? DATA.users[adminId].name : 'tanpa PIC';
  await logActivity('SYSTEM_PIC_CHANGED', null, `PIC sistem ${x.system_name} diubah menjadi ${picName}`);
  if (adminId && adminId !== SESSION.user_id) await notify([adminId], `🎯 Anda ditetapkan sebagai PIC sistem ${x.system_name}.`, null);
}
async function sysToggle(id) {
  const x = DATA.systems[id]; if (!x) return;
  const to = x.status === 'inactive' ? 'active' : 'inactive';
  await Store.update({ [`systems/${id}/status`]: to });
  await logActivity('SYSTEM_STATUS_CHANGED', null, `Sistem ${x.system_name} ${to === 'active' ? 'diaktifkan' : 'dinonaktifkan'}`);
  renderPage();
}
async function sysAdd() {
  const input = document.getElementById('newSysName');
  const name = (input.value || '').trim();
  const pic = comboVal('newSysPic');
  if (!name) return;
  const id = Store.pushKey();
  await Store.update({ ['systems/' + id]: { system_id: id, system_name: name, status: 'active', pic: pic || null } });
  await logActivity('SYSTEM_ADDED', null, `Sistem baru ditambahkan: ${name}`);
  renderPage();
}

/* ================= BOOT ================= */
if (!USE_FIREBASE) {
  document.getElementById('demoBanner').hidden = false;
}
applyTheme(getTheme());
SESSION = getSession();
Store.init(data => {
  DATA = data || DATA;
  if (!DATA.comments) DATA.comments = {};
  if (!DATA.notifications) DATA.notifications = {};
  renderRoot();
});

</script>
