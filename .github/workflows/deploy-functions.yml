# ============================================================
# Deploy Cloud Functions — E-Tiket ApotekKU
# Jalankan manual: tab Actions → Deploy Cloud Functions → Run workflow
# Butuh 3 repository secrets (Settings → Secrets and variables → Actions):
#   FIREBASE_SERVICE_ACCOUNT  (isi file JSON service account)
#   VAPID_PUBLIC_KEY
#   VAPID_PRIVATE_KEY
# ============================================================
name: Deploy Cloud Functions

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Siapkan functions/.env dari secrets
        env:
          PUB: ${{ secrets.VAPID_PUBLIC_KEY }}
          PRIV: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: |
          printf 'VAPID_PUBLIC_KEY=%s\nVAPID_PRIVATE_KEY=%s\n' "$PUB" "$PRIV" > functions/.env

      - name: Install dependensi functions
        run: cd functions && npm install --no-audit --no-fund

      - name: Tulis kredensial service account
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$SA_JSON" > "$RUNNER_TEMP/sa.json"

      - name: Deploy ke Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: npx firebase-tools@13 deploy --only functions --project e-tiket-apotekku --non-interactive --force

      - name: Bersihkan kredensial
        if: always()
        run: rm -f "$RUNNER_TEMP/sa.json" functions/.env

